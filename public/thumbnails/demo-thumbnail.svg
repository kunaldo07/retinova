<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <radialGradient id="bgCenter" cx="38%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#0A1A10"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>

    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00E87A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00E87A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="phoneGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00E87A" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00E87A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00C068"/>
      <stop offset="100%" stop-color="#00E87A"/>
    </linearGradient>

    <linearGradient id="chartArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00E87A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00E87A" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00C068"/>
      <stop offset="100%" stop-color="#00E87A"/>
    </linearGradient>

    <linearGradient id="badgeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00E87A"/>
      <stop offset="100%" stop-color="#00C068"/>
    </linearGradient>

    <linearGradient id="sideFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#050508" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050508" stop-opacity="0.85"/>
    </linearGradient>

    <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#050508" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050508" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#000" flood-opacity="0.7"/>
    </filter>

    <clipPath id="thumbClip">
      <rect width="1280" height="720"/>
    </clipPath>

  </defs>

  <g clip-path="url(#thumbClip)">

  <!-- ── BACKGROUND ── -->
  <rect width="1280" height="720" fill="url(#bgCenter)"/>

  <!-- Subtle grid -->
  <g opacity="0.035">
    <line x1="0"    y1="120" x2="1280" y2="120" stroke="white" stroke-width="1"/>
    <line x1="0"    y1="240" x2="1280" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0"    y1="360" x2="1280" y2="360" stroke="white" stroke-width="1"/>
    <line x1="0"    y1="480" x2="1280" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0"    y1="600" x2="1280" y2="600" stroke="white" stroke-width="1"/>
    <line x1="160"  y1="0"   x2="160"  y2="720" stroke="white" stroke-width="1"/>
    <line x1="320"  y1="0"   x2="320"  y2="720" stroke="white" stroke-width="1"/>
    <line x1="480"  y1="0"   x2="480"  y2="720" stroke="white" stroke-width="1"/>
    <line x1="640"  y1="0"   x2="640"  y2="720" stroke="white" stroke-width="1"/>
    <line x1="800"  y1="0"   x2="800"  y2="720" stroke="white" stroke-width="1"/>
    <line x1="960"  y1="0"   x2="960"  y2="720" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0"   x2="1120" y2="720" stroke="white" stroke-width="1"/>
  </g>

  <!-- Ambient glow left-center -->
  <ellipse cx="380" cy="360" rx="420" ry="340" fill="url(#greenGlow)"/>

  <!-- ══════════════════════════════════
       LEFT — PHONE MOCKUP
  ══════════════════════════════════ -->

  <!-- Phone glow behind -->
  <ellipse cx="310" cy="380" rx="220" ry="280" fill="url(#phoneGlow)"/>

  <!-- Phone body -->
  <rect x="130" y="100" width="220" height="440" rx="32" fill="#0C0C18" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- Phone notch -->
  <rect x="195" y="100" width="90" height="26" rx="0 0 16 16" fill="#080810"/>
  <rect x="195" y="112" width="90" height="14" fill="#080810"/>

  <!-- Status bar -->
  <text x="148" y="134" font-family="system-ui" font-size="10" fill="rgba(240,240,245,0.25)">9:41</text>
  <text x="320" y="134" font-family="system-ui" font-size="10" fill="rgba(240,240,245,0.25)" text-anchor="end">●●● 🔋</text>

  <!-- WA Header bar -->
  <rect x="130" y="138" width="220" height="52" fill="#075E54"/>
  <circle cx="158" cy="164" r="14" fill="#25D366"/>
  <text x="158" y="169" font-family="system-ui" font-size="12" font-weight="700" fill="white" text-anchor="middle">R</text>
  <text x="180" y="160" font-family="system-ui" font-size="11" font-weight="600" fill="white">Ratinova Alerts</text>
  <text x="180" y="176" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.6)">● online now</text>

  <!-- Message 1 — 5 star -->
  <rect x="142" y="202" width="195" height="68" rx="0 12 12 12" fill="#1F2C34"/>
  <text x="154" y="220" font-family="system-ui" font-size="9" font-weight="700" fill="#00E87A">🌟 New Review — Google</text>
  <text x="154" y="236" font-family="system-ui" font-size="11" fill="#F0F0F5">★★★★★ Priya S.</text>
  <text x="154" y="252" font-family="system-ui" font-size="9" fill="rgba(240,240,245,0.45)">"Amazing food, will return!"</text>
  <text x="327" y="262" font-family="system-ui" font-size="8" fill="rgba(255,255,255,0.2)" text-anchor="end">just now</text>

  <!-- Message 2 — caught privately -->
  <rect x="142" y="282" width="195" height="60" rx="0 12 12 12" fill="#1A0F1F" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="154" y="300" font-family="system-ui" font-size="9" font-weight="700" fill="#A855F7">🔒 Bad Review Caught!</text>
  <text x="154" y="316" font-family="system-ui" font-size="9" fill="rgba(240,240,245,0.6)">2★ feedback — sent to you privately</text>
  <text x="154" y="330" font-family="system-ui" font-size="8" fill="rgba(240,240,245,0.3)">Did NOT reach Google ✓</text>

  <!-- Message 3 — 5 star again -->
  <rect x="142" y="354" width="195" height="56" rx="0 12 12 12" fill="#1F2C34"/>
  <text x="154" y="372" font-family="system-ui" font-size="9" font-weight="700" fill="#00E87A">🌟 New Review — Google</text>
  <text x="154" y="388" font-family="system-ui" font-size="11" fill="#F0F0F5">★★★★★ Rahul M.</text>
  <text x="154" y="402" font-family="system-ui" font-size="9" fill="rgba(240,240,245,0.45)">"Best biryani ever!"</text>

  <!-- Rating badge inside phone bottom -->
  <rect x="142" y="424" width="195" height="44" rx="10" fill="rgba(0,232,122,0.08)" stroke="rgba(0,232,122,0.2)" stroke-width="1"/>
  <text x="239" y="442" font-family="system-ui" font-size="11" font-weight="700" fill="#00E87A" text-anchor="middle">Google Rating</text>
  <text x="239" y="459" font-family="system-ui" font-size="13" font-weight="800" fill="#F0F0F5" text-anchor="middle">4.8 ★★★★★</text>

  <!-- Phone bottom bar -->
  <rect x="195" y="510" width="90" height="5" rx="2.5" fill="rgba(255,255,255,0.1)"/>

  <!-- Fade left edge of phone -->
  <rect x="0" y="0" width="200" height="720" fill="url(#leftFade)"/>

  <!-- ══════════════════════════════════
       CENTER-RIGHT — MAIN TEXT
  ══════════════════════════════════ -->

  <!-- Fade phone into text area -->
  <rect x="320" y="0" width="200" height="720" fill="url(#leftFade)" transform="scale(-1,1) translate(-840,0)"/>

  <!-- TOP LABEL -->
  <rect x="560" y="100" width="280" height="36" rx="18" fill="rgba(0,232,122,0.1)" stroke="rgba(0,232,122,0.25)" stroke-width="1.5"/>
  <circle cx="584" cy="118" r="5" fill="#00E87A"/>
  <text x="640" y="123" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="14" font-weight="700" fill="#00E87A" text-anchor="middle" letter-spacing="1">FULL PRODUCT DEMO</text>

  <!-- MAIN HEADLINE — Before -->
  <text
    x="560"
    y="228"
    font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"
    font-size="56"
    font-weight="800"
    fill="rgba(240,240,245,0.45)"
    filter="url(#textShadow)"
  >Google Rating</text>

  <!-- Before number -->
  <text
    x="560"
    y="320"
    font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"
    font-size="110"
    font-weight="800"
    fill="rgba(240,240,245,0.28)"
    filter="url(#textShadow)"
  >4.1★</text>

  <!-- ARROW -->
  <g filter="url(#glow)" transform="translate(560, 355)">
    <rect width="200" height="14" rx="7" fill="url(#arrowGrad)"/>
    <polygon points="200,0 230,7 200,14" fill="#00E87A"/>
  </g>

  <!-- After number — BIG GREEN -->
  <text
    x="556"
    y="500"
    font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"
    font-size="140"
    font-weight="800"
    fill="#00E87A"
    filter="url(#glow)"
  >4.8★</text>

  <!-- "in 30 days" -->
  <text
    x="562"
    y="560"
    font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"
    font-size="38"
    font-weight="600"
    fill="rgba(240,240,245,0.5)"
    filter="url(#textShadow)"
  >in 30 days — automatically</text>

  <!-- ══════════════════════════════════
       RIGHT — MINI CHART
  ══════════════════════════════════ -->

  <!-- Chart panel -->
  <rect x="980" y="160" width="260" height="200" rx="16" fill="#0F0F1A" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="1000" y="184" font-family="system-ui" font-size="11" font-weight="700" fill="rgba(240,240,245,0.4)" letter-spacing="0.08em">REVIEWS THIS MONTH</text>

  <!-- Chart area -->
  <path d="M1000 320 C1020 316 1040 310 1060 298 C1080 286 1100 272 1120 258 C1140 244 1160 238 1180 232 C1200 226 1215 222 1230 218 L1230 340 L1000 340 Z" fill="url(#chartArea)"/>
  <path d="M1000 320 C1020 316 1040 310 1060 298 C1080 286 1100 272 1120 258 C1140 244 1160 238 1180 232 C1200 226 1215 222 1230 218" stroke="#00E87A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- End dot -->
  <circle cx="1230" cy="218" r="6" fill="#00E87A" filter="url(#softGlow)"/>
  <circle cx="1230" cy="218" r="12" fill="#00E87A" opacity="0.15"/>
  <!-- Grid lines inside chart -->
  <line x1="1000" y1="260" x2="1230" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="1000" y1="300" x2="1230" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="1000" y1="340" x2="1230" y2="340" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- X labels -->
  <text x="1000" y="356" font-family="system-ui" font-size="9" fill="rgba(240,240,245,0.2)">Week 1</text>
  <text x="1100" y="356" font-family="system-ui" font-size="9" fill="rgba(240,240,245,0.2)">Week 2</text>
  <text x="1200" y="356" font-family="system-ui" font-size="9" fill="rgba(240,240,245,0.2)">Week 4</text>

  <!-- Stat cards right -->
  <rect x="980" y="382" width="120" height="76" rx="12" fill="#0F0F1A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="1000" y="404" font-family="system-ui" font-size="9" font-weight="700" fill="rgba(240,240,245,0.3)" letter-spacing="0.08em">NEW REVIEWS</text>
  <text x="1000" y="438" font-family="system-ui" font-size="34" font-weight="800" fill="#00E87A">+47</text>
  <text x="1000" y="452" font-family="system-ui" font-size="9" fill="rgba(0,232,122,0.6)">↑ 3× last month</text>

  <rect x="1120" y="382" width="120" height="76" rx="12" fill="#0F0F1A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="1140" y="404" font-family="system-ui" font-size="9" font-weight="700" fill="rgba(240,240,245,0.3)" letter-spacing="0.08em">QR SCANS</text>
  <text x="1140" y="438" font-family="system-ui" font-size="34" font-weight="800" fill="#F0F0F5">312</text>
  <text x="1140" y="452" font-family="system-ui" font-size="9" fill="rgba(0,232,122,0.6)">this month</text>

  <!-- Smart routing card -->
  <rect x="980" y="474" width="260" height="56" rx="12" fill="rgba(0,232,122,0.06)" stroke="rgba(0,232,122,0.15)" stroke-width="1"/>
  <text x="1000" y="496" font-family="system-ui" font-size="10" font-weight="700" fill="#00E87A">Smart Routing — ACTIVE</text>
  <text x="1000" y="514" font-family="system-ui" font-size="9" fill="rgba(240,240,245,0.35)">6 bad reviews caught privately this week</text>
  <!-- Toggle ON -->
  <rect x="1190" y="483" width="36" height="18" rx="9" fill="#00E87A"/>
  <circle cx="1218" cy="492" r="7" fill="white"/>

  <!-- ══════════════════════════════════
       BOTTOM BAR
  ══════════════════════════════════ -->

  <!-- Bottom dark bar -->
  <rect x="0" y="620" width="1280" height="100" fill="#050508" opacity="0.9"/>
  <rect x="0" y="618" width="1280" height="2" fill="#00E87A" opacity="0.25"/>

  <!-- Ratinova logo bottom left -->
  <g transform="translate(48, 644)">
    <rect width="40" height="40" rx="10" fill="rgba(0,232,122,0.12)"/>
    <rect x="7"  y="28" width="5" height="8"  rx="1.5" fill="#00E87A" opacity="0.3"/>
    <rect x="15" y="22" width="5" height="14" rx="1.5" fill="#00E87A" opacity="0.6"/>
    <rect x="23" y="14" width="5" height="22" rx="1.5" fill="#00E87A" opacity="0.9"/>
    <path d="M33.5 5 L34.6 8.4 L38.2 8.4 L35.4 10.6 L36.5 14 L33.5 12 L30.5 14 L31.6 10.6 L28.8 8.4 L32.4 8.4 Z" fill="#00E87A"/>
  </g>
  <text x="100" y="662" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="20" font-weight="800" fill="#F0F0F5">Ratinova</text>
  <text x="100" y="682" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="12" fill="rgba(240,240,245,0.35)">Review management for restaurants</text>

  <!-- Divider -->
  <rect x="310" y="640" width="1" height="60" fill="rgba(255,255,255,0.08)"/>

  <!-- Bottom pills -->
  <rect x="334" y="652" width="148" height="32" rx="16" fill="rgba(0,232,122,0.08)" stroke="rgba(0,232,122,0.18)" stroke-width="1"/>
  <text x="408" y="672" font-family="system-ui" font-size="12" font-weight="600" fill="#00E87A" text-anchor="middle">14-Day Free Trial</text>

  <rect x="496" y="652" width="148" height="32" rx="16" fill="rgba(0,232,122,0.08)" stroke="rgba(0,232,122,0.18)" stroke-width="1"/>
  <text x="570" y="672" font-family="system-ui" font-size="12" font-weight="600" fill="#00E87A" text-anchor="middle">No Card Needed</text>

  <rect x="658" y="652" width="148" height="32" rx="16" fill="rgba(0,232,122,0.08)" stroke="rgba(0,232,122,0.18)" stroke-width="1"/>
  <text x="732" y="672" font-family="system-ui" font-size="12" font-weight="600" fill="#00E87A" text-anchor="middle">2-Min Setup</text>

  <!-- CTA button bottom right -->
  <rect x="980" y="643" width="252" height="54" rx="12" fill="url(#badgeBg)"/>
  <text x="1106" y="675" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="18" font-weight="700" fill="#000" text-anchor="middle">Watch Full Demo →</text>

  <!-- ── EDGE POLISH ── -->
  <!-- Top edge line -->
  <rect x="0" y="0" width="1280" height="3" fill="#00E87A" opacity="0.4"/>
  <!-- Vignette corners -->
  <radialGradient id="vigTL" cx="0%" cy="0%" r="60%">
    <stop offset="0%"   stop-color="#000" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="vigTR" cx="100%" cy="0%" r="60%">
    <stop offset="0%"   stop-color="#000" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <rect width="1280" height="720" fill="url(#vigTL)"/>
  <rect width="1280" height="720" fill="url(#vigTR)"/>

  </g>
</svg>
