<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#08120A"/>
      <stop offset="70%" stop-color="#060808"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="leftRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E87A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00E87A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="greenGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C068"/>
      <stop offset="100%" stop-color="#00E87A"/>
    </linearGradient>
    <linearGradient id="redGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="glow2g">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2r">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2p">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="c2"><rect width="1280" height="720"/></clipPath>
  </defs>
  <g clip-path="url(#c2)">

  <rect width="1280" height="720" fill="url(#bg2)"/>

  <!-- Grid -->
  <g opacity="0.03">
    <line x1="0" y1="144" x2="1280" y2="144" stroke="white" stroke-width="1"/>
    <line x1="0" y1="288" x2="1280" y2="288" stroke="white" stroke-width="1"/>
    <line x1="0" y1="432" x2="1280" y2="432" stroke="white" stroke-width="1"/>
    <line x1="0" y1="576" x2="1280" y2="576" stroke="white" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="720" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="720" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="720" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="720" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="720" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="720" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="720" stroke="white" stroke-width="1"/>
  </g>

  <!-- Ambient glows -->
  <ellipse cx="260" cy="420" rx="320" ry="280" fill="url(#leftRed)"/>
  <ellipse cx="1020" cy="380" rx="320" ry="280" fill="url(#rightGreen)"/>
  <ellipse cx="640" cy="280" rx="280" ry="200" fill="url(#centerGlow2)"/>

  <!-- ── CENTER TOP: Customer rates ── -->
  <rect x="500" y="60" width="280" height="110" rx="18" fill="#0F0F1A" stroke="rgba(139,92,246,0.3)" stroke-width="1.5"/>
  <text x="640" y="94" font-family="system-ui" font-size="12" font-weight="700" fill="rgba(139,92,246,0.7)" text-anchor="middle" letter-spacing="0.1em">CUSTOMER RATES VIA QR</text>
  <!-- Stars row -->
  <text x="567" y="140" font-family="system-ui" font-size="36" fill="#EF4444">★★</text>
  <text x="640" y="140" font-family="system-ui" font-size="36" fill="rgba(240,240,245,0.15)">☆☆☆</text>
  <text x="517" y="158" font-family="system-ui" font-size="10" fill="rgba(240,240,245,0.25)" text-anchor="middle">2 stars</text>

  <!-- Split arrows down -->
  <!-- Left arrow to bad path -->
  <path d="M580 172 L580 210 L220 290" stroke="#EF4444" stroke-width="2.5" fill="none" stroke-dasharray="6 3" opacity="0.6"/>
  <!-- Right arrow to good path -->
  <path d="M700 172 L700 210 L1060 290" stroke="#00E87A" stroke-width="2.5" fill="none" stroke-dasharray="6 3" opacity="0.6"/>

  <!-- Routing engine badge -->
  <rect x="554" y="188" width="172" height="32" rx="10" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="640" y="208" font-family="system-ui" font-size="11" font-weight="700" fill="rgba(139,92,246,0.8)" text-anchor="middle" filter="url(#glow2p)">⚡ ROUTING ENGINE</text>

  <!-- ── LEFT: BAD PATH ── -->
  <!-- Card -->
  <rect x="40" y="295" width="360" height="260" rx="20" fill="#100808" stroke="rgba(239,68,68,0.3)" stroke-width="1.5"/>
  <!-- Red top stripe -->
  <rect x="40" y="295" width="360" height="4" rx="2" fill="#EF4444" opacity="0.6"/>

  <text x="220" y="342" font-family="system-ui" font-size="13" font-weight="700" fill="#EF4444" text-anchor="middle" letter-spacing="0.1em">1 – 3 STARS</text>

  <!-- Big X -->
  <text x="220" y="408" font-family="system-ui" font-size="80" fill="#EF4444" text-anchor="middle" filter="url(#glow2r)" opacity="0.9">✕</text>

  <text x="220" y="458" font-family="system-ui" font-size="22" font-weight="800" fill="#F0F0F5" text-anchor="middle">Goes to Google?</text>

  <!-- NO badge -->
  <rect x="130" y="472" width="180" height="52" rx="12" fill="#EF4444"/>
  <text x="220" y="504" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="26" font-weight="800" fill="white" text-anchor="middle">NEVER. 🔒</text>

  <!-- Arrow down to private -->
  <path d="M220 555 L220 585" stroke="#EF4444" stroke-width="2" fill="none" opacity="0.5"/>
  <rect x="90" y="585" width="260" height="40" rx="10" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="220" y="610" font-family="system-ui" font-size="12" fill="rgba(240,240,245,0.6)" text-anchor="middle">Sent privately to you on WhatsApp</text>

  <!-- ── RIGHT: GOOD PATH ── -->
  <rect x="880" y="295" width="360" height="260" rx="20" fill="#081008" stroke="rgba(0,232,122,0.3)" stroke-width="1.5"/>
  <!-- Green top stripe -->
  <rect x="880" y="295" width="360" height="4" rx="2" fill="#00E87A" opacity="0.6"/>

  <text x="1060" y="342" font-family="system-ui" font-size="13" font-weight="700" fill="#00E87A" text-anchor="middle" letter-spacing="0.1em">4 – 5 STARS</text>

  <!-- Big check -->
  <text x="1060" y="408" font-family="system-ui" font-size="80" fill="#00E87A" text-anchor="middle" filter="url(#glow2g)" opacity="0.9">✓</text>

  <text x="1060" y="458" font-family="system-ui" font-size="22" font-weight="800" fill="#F0F0F5" text-anchor="middle">Goes to Google?</text>

  <!-- YES badge -->
  <rect x="970" y="472" width="180" height="52" rx="12" fill="url(#greenGrad2)"/>
  <text x="1060" y="504" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="26" font-weight="800" fill="#000" text-anchor="middle">INSTANTLY ★</text>

  <!-- Arrow down to Google -->
  <path d="M1060 555 L1060 585" stroke="#00E87A" stroke-width="2" fill="none" opacity="0.5"/>
  <rect x="930" y="585" width="260" height="40" rx="10" fill="rgba(0,232,122,0.08)" stroke="rgba(0,232,122,0.2)" stroke-width="1"/>
  <text x="1060" y="610" font-family="system-ui" font-size="12" fill="rgba(240,240,245,0.6)" text-anchor="middle">Posted live on Google Reviews</text>

  <!-- ── MAIN HEADLINE ── center bottom -->
  <text x="640" y="670" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="52" font-weight="800" fill="#F0F0F5" text-anchor="middle" letter-spacing="-1.5">Bad reviews <tspan fill="#EF4444">never</tspan> reach Google.</text>

  <!-- Ratinova bottom left -->
  <g transform="translate(48, 30)">
    <rect width="36" height="36" rx="9" fill="rgba(0,232,122,0.12)"/>
    <rect x="6" y="24" width="4.5" height="8" rx="1.5" fill="#00E87A" opacity="0.3"/>
    <rect x="13" y="19" width="4.5" height="13" rx="1.5" fill="#00E87A" opacity="0.6"/>
    <rect x="20" y="12" width="4.5" height="20" rx="1.5" fill="#00E87A" opacity="0.9"/>
    <path d="M30 4 L31 7 L34 7 L31.7 9 L32.7 12 L30 10.2 L27.3 12 L28.3 9 L26 7 L29 7 Z" fill="#00E87A"/>
  </g>
  <text x="94" y="43" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="17" font-weight="800" fill="#F0F0F5">Ratinova</text>
  <text x="94" y="58" font-family="system-ui" font-size="10" fill="rgba(240,240,245,0.3)">ratinova.com</text>

  <!-- Top edge -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#greenGrad2)" opacity="0.6"/>

  </g>
</svg>
