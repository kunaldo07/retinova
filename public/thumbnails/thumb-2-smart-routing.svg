<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <linearGradient id="splitGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E87A" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00E87A" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="splitRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF4444" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="gb2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E87A"/>
      <stop offset="100%" stop-color="#00C068"/>
    </linearGradient>
    <clipPath id="c2"><rect width="1280" height="720"/></clipPath>
  </defs>
  <g clip-path="url(#c2)">

  <rect width="1280" height="720" fill="url(#bg2)"/>

  <!-- Split background halves — subtle -->
  <rect x="0"   y="0" width="640" height="720" fill="url(#splitRed)"/>
  <rect x="640" y="0" width="640" height="720" fill="url(#splitGreen)"/>

  <!-- Center divider line -->
  <rect x="636" y="0" width="8" height="720" fill="rgba(255,255,255,0.06)"/>

  <!-- Grid -->
  <g opacity="0.035" stroke="white" stroke-width="1">
    <line x1="0" y1="144" x2="1280" y2="144"/><line x1="0" y1="288" x2="1280" y2="288"/>
    <line x1="0" y1="432" x2="1280" y2="432"/><line x1="0" y1="576" x2="1280" y2="576"/>
    <line x1="160" y1="0" x2="160" y2="720"/><line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/><line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/><line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>

  <!-- ── LEFT SIDE — BAD REVIEW CAUGHT ── -->
  <!-- Big label -->
  <rect x="40" y="60" width="240" height="44" rx="22" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.3)" stroke-width="1.5"/>
  <text x="160" y="88" font-family="-apple-system,system-ui,sans-serif" font-size="16" font-weight="700" fill="#FF6666" text-anchor="middle" letter-spacing="1">1–3 STARS</text>

  <!-- Big emoji / icon -->
  <text x="60" y="220" font-family="-apple-system,system-ui,sans-serif" font-size="100">😤</text>

  <!-- Text -->
  <text x="40" y="320" font-family="-apple-system,system-ui,sans-serif" font-size="42" font-weight="800" fill="#FF5555">Bad Review?</text>
  <text x="40" y="378" font-family="-apple-system,system-ui,sans-serif" font-size="38" font-weight="800" fill="#F0F0F5">Goes to</text>
  <text x="40" y="436" font-family="-apple-system,system-ui,sans-serif" font-size="52" font-weight="800" fill="#FF5555">YOU</text>
  <text x="40" y="490" font-family="-apple-system,system-ui,sans-serif" font-size="28" fill="rgba(240,240,245,0.45)">Privately on WhatsApp.</text>
  <text x="40" y="524" font-family="-apple-system,system-ui,sans-serif" font-size="28" fill="rgba(240,240,245,0.45)">Never reaches Google.</text>

  <!-- Private badge -->
  <rect x="40" y="570" width="220" height="52" rx="12" fill="rgba(255,68,68,0.12)" stroke="rgba(255,68,68,0.25)" stroke-width="1.5"/>
  <text x="150" y="600" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="700" fill="#FF6666" text-anchor="middle">🔒 PRIVATE</text>

  <!-- ── CENTER TOP — Arrow and rating ── -->
  <rect x="540" y="30" width="200" height="56" rx="28" fill="#13131E" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <text x="640" y="64" font-family="-apple-system,system-ui,sans-serif" font-size="28" text-anchor="middle">⭐ Rating</text>

  <!-- Arrows -->
  <path d="M560 130 L400 240" stroke="rgba(255,100,100,0.5)" stroke-width="3" stroke-dasharray="8,6" stroke-linecap="round"/>
  <path d="M720 130 L880 240" stroke="rgba(0,232,122,0.5)" stroke-width="3" stroke-dasharray="8,6" stroke-linecap="round"/>

  <!-- ── RIGHT SIDE — GOOD REVIEW TO GOOGLE ── -->
  <rect x="1000" y="60" width="240" height="44" rx="22" fill="rgba(0,232,122,0.12)" stroke="rgba(0,232,122,0.3)" stroke-width="1.5"/>
  <text x="1120" y="88" font-family="-apple-system,system-ui,sans-serif" font-size="16" font-weight="700" fill="#00E87A" text-anchor="middle" letter-spacing="1">4–5 STARS</text>

  <!-- Big emoji -->
  <text x="900" y="220" font-family="-apple-system,system-ui,sans-serif" font-size="100">😊</text>

  <!-- Text -->
  <text x="680" y="320" font-family="-apple-system,system-ui,sans-serif" font-size="42" font-weight="800" fill="#00E87A">Good Review?</text>
  <text x="680" y="378" font-family="-apple-system,system-ui,sans-serif" font-size="38" font-weight="800" fill="#F0F0F5">Goes straight</text>
  <text x="680" y="436" font-family="-apple-system,system-ui,sans-serif" font-size="52" font-weight="800" fill="#00E87A">to Google</text>
  <text x="680" y="490" font-family="-apple-system,system-ui,sans-serif" font-size="28" fill="rgba(240,240,245,0.45)">Publicly. Automatically.</text>
  <text x="680" y="524" font-family="-apple-system,system-ui,sans-serif" font-size="28" fill="rgba(240,240,245,0.45)">Your rating goes up.</text>

  <!-- Google badge -->
  <rect x="680" y="570" width="300" height="52" rx="12" fill="rgba(0,232,122,0.1)" stroke="rgba(0,232,122,0.25)" stroke-width="1.5"/>
  <text x="830" y="600" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="700" fill="#00E87A" text-anchor="middle">🌟 PUBLIC ON GOOGLE</text>

  <!-- Bottom headline spanning full width -->
  <rect x="0" y="648" width="1280" height="72" fill="rgba(0,0,0,0.4)"/>
  <text x="640" y="695" font-family="-apple-system,system-ui,sans-serif" font-size="32" font-weight="800" fill="#F0F0F5" text-anchor="middle">Bad reviews <tspan fill="#FF5555">NEVER</tspan> reach Google — <tspan fill="#00E87A">Ratinova</tspan></text>

  <!-- Border -->
  <rect x="0" y="0" width="8" height="720" fill="url(#gb2)" opacity="0.6"/>
  <rect x="0" y="717" width="1280" height="3" fill="url(#gb2)" opacity="0.5"/>
  </g>
</svg>
