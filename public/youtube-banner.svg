    <line x1="320"  y1="0" x2="320"  y2="1440" stroke="white" stroke-width="1"/>
    <line x1="480"  y1="0" x2="480"  y2="1440" stroke="white" stroke-width="1"/>
    <line x1="640"  y1="0" x2="640"  y2="1440" stroke="white" stroke-width="1"/>
    <line x1="800"  y1="0" x2="800"  y2="1440" stroke="white" stroke-width="1"/>
    <line x1="960"  y1="0" x2="960"  y2="1440" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="1440" stroke="white" stroke-width="1"/>
    <line x1="1280" y1="0" x2="1280" y2="1440" stroke="white" stroke-width="1"/>
    <line x1="1440" y1="0" x2="1440" y2="1440" stroke="white" stroke-width="1"/>
    <line x1="1600" y1="0" x2="1600" y2="1440" stroke="white" stroke-width="1"/>
    <line x1="1760" y1="0" x2="1760" y2="1440" stroke="white" stroke-width="1"/>
    <line x1="1920" y1="0" x2="1920" y2="1440" stroke="white" stroke-width="1"/>
