    <rect x="114" y="350" width="32" height="90"  rx="6" fill="#00E87A" opacity="0.5"/>
    <rect x="156" y="330" width="32" height="110" rx="6" fill="#00E87A" opacity="0.65"/>
    <rect x="198" y="310" width="32" height="130" rx="6" fill="#00E87A" opacity="0.8"/>
    <rect x="240" y="295" width="32" height="145" rx="6" fill="#00E87A" opacity="0.95"/>
