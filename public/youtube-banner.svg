  <rect x="1380" y="740" width="220" height="44" rx="22" fill="rgba(0,232,122,0.08)" stroke="rgba(0,232,122,0.2)" stroke-width="1.5"/>
  <circle cx="1410" cy="762" r="6" fill="#00E87A"/>
  <text x="1426" y="767" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="18" font-weight="600" fill="rgba(240,240,245,0.7)">QR Collection</text>

  <!-- Pill 5 -->
  <rect x="1620" y="740" width="200" height="44" rx="22" fill="rgba(0,232,122,0.08)" stroke="rgba(0,232,122,0.2)" stroke-width="1.5"/>
  <circle cx="1650" cy="762" r="6" fill="#00E87A"/>
  <text x="1666" y="767" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="18" font-weight="600" fill="rgba(240,240,245,0.7)">Free 14 Days</text>

