<svg width="2560" height="1440" viewBox="0 0 2560 1440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#0D1A12"/>
      <stop offset="60%"  stop-color="#070A0E"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>

    <!-- Center green glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00E87A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00E87A" stop-opacity="0"/>
    </radialGradient>

    <!-- Left glow -->
    <radialGradient id="leftGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00E87A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00E87A" stop-opacity="0"/>
    </radialGradient>

    <!-- Right glow -->
    <radialGradient id="rightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0050FF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0050FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo icon bg gradient -->
    <linearGradient id="iconBg" x1="0" y1="0" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00E87A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00E87A" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Bar chart gradient -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00E87A"/>
      <stop offset="100%" stop-color="#00C068"/>
    </linearGradient>

    <!-- Chart area fill -->
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00E87A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00E87A" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip for full canvas -->
    <clipPath id="clip">
      <rect width="2560" height="1440"/>
    </clipPath>

  </defs>

  <g clip-path="url(#clip)">

  <!-- ── BACKGROUND ── -->
  <rect width="2560" height="1440" fill="url(#bgGlow)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
